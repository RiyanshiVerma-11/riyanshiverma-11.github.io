<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" x2="100%">
      <stop offset="0%" stop-color="#07090e" />
      <stop offset="50%" stop-color="#0c101b" />
      <stop offset="100%" stop-color="#111627" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    <linearGradient id="sub-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F355DA" />
      <stop offset="100%" stop-color="#7000FF" />
    </linearGradient>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg-grad)" />

  <!-- Grid Pattern Overlay -->
  <g opacity="0.06">
    <path d="M 0 50 L 1200 50 M 0 100 L 1200 100 M 0 150 L 1200 150 M 0 200 L 1200 200 M 0 250 L 1200 250" stroke="#4FACFE" stroke-width="1" />
    <path d="M 100 0 L 100 300 M 200 0 L 200 300 M 300 0 L 300 300 M 400 0 L 400 300 M 500 0 L 500 300 M 600 0 L 600 300 M 700 0 L 700 300 M 800 0 L 800 300 M 900 0 L 900 300 M 1000 0 L 1000 300 M 1100 0 L 1100 300" stroke="#4FACFE" stroke-width="1" />
  </g>

  <!-- Animated-like Neural Connections (SVG paths) -->
  <g opacity="0.45">
    <!-- Main network lines -->
    <path d="M 850 70 L 950 120 L 1050 90 L 1120 180 L 1000 220 L 900 190 L 850 70 Z" fill="none" stroke="#00F2FE" stroke-width="1.5" filter="url(#glow-cyan)" />
    <path d="M 950 120 L 1000 220 M 1050 90 L 900 190 M 850 70 L 1050 90 M 950 120 L 1120 180" stroke="#7000FF" stroke-width="1" filter="url(#glow-purple)" />
    
    <!-- Secondary network nodes -->
    <circle cx="850" cy="70" r="5" fill="#00F2FE" />
    <circle cx="950" cy="120" r="6" fill="#4FACFE" />
    <circle cx="1050" cy="90" r="5" fill="#7000FF" />
    <circle cx="1120" cy="180" r="7" fill="#F355DA" />
    <circle cx="1000" cy="220" r="6" fill="#00F2FE" />
    <circle cx="900" cy="190" r="5" fill="#7000FF" />
    
    <!-- Minor background nodes -->
    <circle cx="800" cy="150" r="2" fill="#4FACFE" opacity="0.5" />
    <circle cx="980" cy="50" r="3" fill="#F355DA" opacity="0.5" />
    <circle cx="1080" cy="240" r="2" fill="#00F2FE" opacity="0.5" />
    <line x1="800" y1="150" x2="850" y2="70" stroke="#4FACFE" stroke-width="0.5" />
    <line x1="980" y1="50" x2="950" y2="120" stroke="#F355DA" stroke-width="0.5" />
    <line x1="1080" y1="240" x2="1000" y2="220" stroke="#00F2FE" stroke-width="0.5" />
  </g>

  <!-- Title and Text -->
  <g transform="translate(80, 0)">
    <!-- Tech Tag -->
    <rect x="0" y="65" width="160" height="24" rx="12" fill="#121D33" stroke="#00F2FE" stroke-width="1" opacity="0.8" />
    <text x="80" y="81" fill="#00F2FE" font-family="'Fira Code', 'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle" letter-spacing="1.5">INITIALIZING_AGENT...</text>
    
    <!-- Name -->
    <text x="0" y="150" fill="#FFFFFF" font-family="'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="58" font-weight="900" letter-spacing="2">
      RIYANSHI VERMA
    </text>
    
    <!-- Subtitle / Role -->
    <text x="0" y="195" fill="url(#text-grad)" font-family="'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="700" letter-spacing="4">
      GENERATIVE AI ENGINEER &amp; SYSTEMS DEVELOPER
    </text>

    <!-- Bio bullet line -->
    <text x="0" y="235" fill="#8F9CAE" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" letter-spacing="1">
      ⚡ Designing multi-agent frameworks, custom RAG pipelines, and intelligent neural systems.
    </text>
  </g>
</svg>
